<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video.js YouTube Player</title>
    <!-- Load Video.js standard CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="url-input-container">
        <input type="text" id="youtube-url-input" class="url-input" placeholder="Paste YouTube link here...">
        <button id="load-video-btn" class="load-btn">Load Video</button>
    </div>

    <main class="player-container">
        <!-- Video.js container -->
        <video
            id="yt-video-player"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            preload="auto"
            width="100%"
            height="100%"
        >
        </video>
        <!-- Hidden audio player for high quality separate audio stream -->
        <audio id="yt-audio-player" style="display: none;"></audio>
    </main>

    <!-- Load Video.js -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
